# This is a basic workflow to help you get started with Actions

name: Deploy Github Pages

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Update submodule
        run: git submodule update --init --recursive --force

      - name: Setup Node.js
        uses: actions/setup-node@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          node-version: '24.x'

      - name: Install pnpm
        run: npm install -g pnpm@8

      - name: Install dependencies
        run: rm pnpm-lock.yaml && pnpm install

      - name: Build Tailwind CSS
        run: pnpm run build

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: '0.147.3'
          extended: true

      - name: Build Hugo Site
        env:
          HUGO_ENV: production
          # Private-app endpoints injected from repo secrets (not committed to
          # this public repo). Override params.pulseAppURL / params.demoAppURL.
          HUGO_PARAMS_PULSEAPPURL: ${{ secrets.PULSE_APP_URL }}
          HUGO_PARAMS_DEMOAPPURL: ${{ secrets.DEMO_APP_URL }}
          HUGO_PARAMS_COREAPPURL: ${{ secrets.CORE_APP_URL }}
        run: hugo -d docs

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          force_orphan: true
