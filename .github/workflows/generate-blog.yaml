name: Generate Blog Article

on:
  # Trigger when issue is opened with 'blog-request' label
  issues:
    types: [opened, labeled]
  # Keep repository_dispatch for Slack webhook integration
  repository_dispatch:
    types: [generate_blog]
  # Keep manual trigger as fallback
  workflow_dispatch:
    inputs:
      topic:
        description: "Blog topic to generate"
        required: true
        type: string
      audience:
        description: "Target decision maker (audience)"
        required: false
        type: string
      value_driver:
        description: "Primary value driver"
        required: false
        type: string
      context:
        description: "Additional context or links"
        required: false
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  generate-blog:
    if: github.event_name != 'issues' || contains(github.event.issue.labels.*.name, 'blog-request')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Ensure output directories exist
        run: mkdir -p content/blog

      - name: Extract Context & Topic
        id: topic
        uses: actions/github-script@v7
        with:
          script: |
            const eventName = context.eventName;
            let topic = "";
            let audience = "";
            let valueDriver = "";
            let links = "";
            let issueNumber = "";

            // Helper to generate slug
            const slugify = (text) => {
              return text
                .toString()
                .toLowerCase()
                .trim()
                .replace(/\s+/g, '-')     // Replace spaces with -
                .replace(/[^\w\-]+/g, '') // Remove all non-word chars
                .replace(/\-\-+/g, '-');   // Replace multiple - with single -
            };

            if (eventName === 'issues') {
              const issue = context.payload.issue;
              const title = issue.title;
              const body = issue.body || "";
              
              issueNumber = issue.number;
              
              // 1. Get Topic from Title (strip prefix)
              topic = title.replace(/^\[Blog Request\]:\s*/i, "").trim();
              
              // 2. Parse Form Body (Markdown)
              const extractSection = (header) => {
                const regex = new RegExp(`### ${header}\\s+([\\s\\S]*?)(?=(###|$))`, 'i');
                const match = body.match(regex);
                return match ? match[1].trim() : "";
              };
              
              const businessChallenge = extractSection("Business Challenge / Opportunity");
              links = extractSection("Context & Reference Links");
              audience = extractSection("Target Decision Maker");
              valueDriver = extractSection("Primary Value Driver");
              
              if ((!topic || topic.toLowerCase() === "blog request") && businessChallenge) {
                topic = businessChallenge;
              }
            } else if (eventName === 'workflow_dispatch') {
              topic = context.payload.inputs.topic;
              audience = context.payload.inputs.audience;
              valueDriver = context.payload.inputs.value_driver;
              links = context.payload.inputs.context;
            } else if (eventName === 'repository_dispatch') {
              topic = context.payload.client_payload.topic;
              audience = context.payload.client_payload.audience;
              valueDriver = context.payload.client_payload.value_driver;
              links = context.payload.client_payload.context;
            }

            const slug = slugify(topic);

            // Output
            core.setOutput('topic', topic);
            core.setOutput('slug', slug);
            if (issueNumber) core.setOutput('issue_number', issueNumber);

            // New separate context outputs
            core.setOutput('audience', audience || "");
            core.setOutput('value_driver', valueDriver || "");
            core.setOutput('context_links', links === "No response" ? "" : links || "");

      # --- Sovereign generation: PULSE's own in-cluster Go agent on the local GKE
      # model. No external blogen container, no Tavily, no external AI token. ---
      - id: auth
        name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Install kubectl + GKE auth plugin
        run: gcloud components install gke-gcloud-auth-plugin kubectl --quiet
      - name: Get GKE credentials (as the deployer SA)
        run: gcloud container clusters get-credentials runink-demo --zone northamerica-northeast1-b --project runink

      - name: Build the blogen agent image (idempotent, keyless)
        id: img
        run: |
          set -euo pipefail
          TAG=$(find agents/blogen -type f | sort | xargs sha256sum | sha256sum | cut -c1-12)
          IMG="us-central1-docker.pkg.dev/runink/face/site-blogen:${TAG}"
          echo "img=$IMG" >> "$GITHUB_OUTPUT"
          if gcloud artifacts docker images describe "$IMG" >/dev/null 2>&1; then
            echo "blogen image $IMG exists — skip build"
          else
            gcloud auth print-access-token \
              | docker login -u oauth2accesstoken --password-stdin https://us-central1-docker.pkg.dev
            docker build -t "$IMG" agents/blogen
            docker push "$IMG"
          fi

      - name: Generate article in-cluster (Go agent Job → local model)
        id: blog_gen
        env:
          IMG: ${{ steps.img.outputs.img }}
          NS: inference-system
          TOPIC: ${{ steps.topic.outputs.topic }}
          SLUG: ${{ steps.topic.outputs.slug }}
          AUDIENCE: ${{ steps.topic.outputs.audience }}
          VALUE_DRIVER: ${{ steps.topic.outputs.value_driver }}
          CONTEXT: ${{ steps.topic.outputs.context_links }}
        run: |
          set -uo pipefail
          JOB="blogen-${SLUG}-$(echo "$GITHUB_SHA" | cut -c1-7)"
          JOB="$(echo "$JOB" | cut -c1-60)"
          cat <<EOF | kubectl apply -f -
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: ${JOB}
            namespace: ${NS}
          spec:
            backoffLimit: 0
            ttlSecondsAfterFinished: 300
            activeDeadlineSeconds: 900
            template:
              spec:
                restartPolicy: Never
                containers:
                  - name: blogen
                    image: ${IMG}
                    env:
                      - { name: TOPIC, value: "${TOPIC}" }
                      - { name: SLUG, value: "${SLUG}" }
                      - { name: AUDIENCE, value: "${AUDIENCE}" }
                      - { name: VALUE_DRIVER, value: "${VALUE_DRIVER}" }
                      - { name: CONTEXT, value: "${CONTEXT}" }
                      - { name: INFERENCE_URL, value: "http://inference.${NS}.svc.cluster.local:8080" }
                      # PULSE's own imagegen runner (sd.cpp, CPU) for the hero image; if it is
                      # not up/weighted the agent falls back to a deterministic branded SVG.
                      - { name: IMAGE_GEN_URL, value: "http://pulse-model-imagegen.pulse-system.svc.cluster.local:8080" }
          EOF
          kubectl -n "$NS" wait --for=condition=complete --timeout=900s "job/${JOB}" \
            || { kubectl -n "$NS" wait --for=condition=failed --timeout=5s "job/${JOB}" >/dev/null 2>&1 || true; }
          # Capture the FULL Job log; the agent emits the article + LinkedIn JSON
          # between sentinel markers (diagnostics go to stderr, outside the markers).
          kubectl -n "$NS" logs "job/${JOB}" > /tmp/blogen.log 2>&1 || true
          kubectl -n "$NS" delete job "${JOB}" --ignore-not-found --wait=false

          mkdir -p content/blog
          awk '/^===BLOG-MD-BEGIN===$/{f=1;next} /^===BLOG-MD-END===$/{f=0} f' /tmp/blogen.log > "content/blog/${SLUG}.md"
          if [ ! -s "content/blog/${SLUG}.md" ]; then
            echo "❌ blogen produced no article — see agent log:"; cat /tmp/blogen.log
            exit 1
          fi
          echo "✅ wrote content/blog/${SLUG}.md ($(wc -w < "content/blog/${SLUG}.md") words)"

          LINKEDIN_JSON="$(awk '/^===LINKEDIN-BEGIN===$/{f=1;next} /^===LINKEDIN-END===$/{f=0} f' /tmp/blogen.log)"
          [ -z "$LINKEDIN_JSON" ] && LINKEDIN_JSON='{"company_post":{"text":""},"personal_post":{"text":""}}'
          echo "linkedin_posts<<JSONEOF" >> "$GITHUB_OUTPUT"
          echo "$LINKEDIN_JSON" >> "$GITHUB_OUTPUT"
          echo "JSONEOF" >> "$GITHUB_OUTPUT"

          # Hero image: PNG from the imagegen runner, else the branded SVG fallback.
          # The agent set the article's `image:` frontmatter to match the extension.
          mkdir -p static/images/blog
          awk '/^===IMAGE-PNG-B64-BEGIN===$/{f=1;next} /^===IMAGE-PNG-B64-END===$/{f=0} f' /tmp/blogen.log \
            | tr -d '\n' | base64 -d > "static/images/blog/${SLUG}.png" 2>/dev/null || true
          if [ -s "static/images/blog/${SLUG}.png" ]; then
            echo "🖼️  hero: static/images/blog/${SLUG}.png (imagegen runner)"
          else
            rm -f "static/images/blog/${SLUG}.png"
            awk '/^===IMAGE-SVG-BEGIN===$/{f=1;next} /^===IMAGE-SVG-END===$/{f=0} f' /tmp/blogen.log > "static/images/blog/${SLUG}.svg"
            echo "🖼️  hero: static/images/blog/${SLUG}.svg (sovereign branded fallback)"
          fi

      - name: Validate article quality
        run: |
          SLUG="${{ steps.topic.outputs.slug }}"
          ARTICLE_FILE="content/blog/${SLUG}.md"

          # Check frontmatter exists
          if ! grep -q "^---$" "$ARTICLE_FILE"; then
            echo "❌ Invalid frontmatter"
            exit 1
          fi

          # Check required fields
          for field in title description slug author date tags; do
            if ! grep -q "^${field}:" "$ARTICLE_FILE"; then
              echo "❌ Missing required field: $field"
              exit 1
            fi
          done

          # Check minimum content length (should be substantial)
          WORD_COUNT=$(wc -w < "$ARTICLE_FILE")
          if [ "$WORD_COUNT" -lt 800 ]; then
            echo "❌ Article too short: $WORD_COUNT words (minimum 800)"
            exit 1
          fi

          echo "✅ Article validation passed"
          echo "   Word count: $WORD_COUNT"

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: latest
          extended: true

      - name: Validate Site Build (Hugo)
        run: |
          echo "🏗️ Building site with Hugo to verify content..."
          # Run Hugo to ensure the new article doesn't break the build
          # Using --gc --minify to simulate a production build
          hugo --gc --minify

      - name: Extract Post Content for Slack
        id: post_content
        run: |
          LINKEDIN_JSON='${{ steps.blog_gen.outputs.linkedin_posts }}'

          # Extract using jq, remove quotes
          COMPANY_POST=$(echo "$LINKEDIN_JSON" | jq -r '.company_post.text')
          PERSONAL_POST=$(echo "$LINKEDIN_JSON" | jq -r '.personal_post.text')

          # Escape newlines for Slack JSON payload
          # We use a trick to escape content safely for JSON inclusion
          echo "company_post<<EOF" >> $GITHUB_OUTPUT
          echo "$COMPANY_POST" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "personal_post<<EOF" >> $GITHUB_OUTPUT
          echo "$PERSONAL_POST" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        id: create_pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "📝 Add blog: ${{ steps.topic.outputs.topic }}"
          branch: "blog-auto/${{ steps.topic.outputs.slug }}"
          base: main
          title: "📝 Blog: ${{ steps.topic.outputs.topic }}"
          body: |
            This PR adds a new blog post generated by **PULSE** on the platform's own
            in-cluster model (sovereign — no external AI service).

            **Topic:** ${{ steps.topic.outputs.topic }}
            **Triggered by:** ${{ github.event_name == 'issues' && format('Issue #{0}', steps.topic.outputs.issue_number) || 'Manual trigger' }}

            ## Files Added
            - `content/blog/${{ steps.topic.outputs.slug }}.md`
            - hero image under `static/images/blog/${{ steps.topic.outputs.slug }}.*` (imagegen PNG, or a branded SVG fallback)

            Please review the content before merging.
          labels: "automated-content"

      - name: Comment on issue (success)
        if: success() && github.event_name == 'issues' && steps.topic.outputs.issue_number
        uses: actions/github-script@v7
        with:
          script: |
            const slug = '${{ steps.topic.outputs.slug }}';
            const prNumber = '${{ steps.create_pr.outputs.pull-request-number }}';
            const prUrl = '${{ steps.create_pr.outputs.pull-request-url }}';

            let message = `✅ **Blog Article Generated Successfully!** (PULSE, sovereign in-cluster model)\n\n📁 **Files Generated:**\n- \`content/blog/${slug}.md\`\n- hero image (\`static/images/blog/${slug}.*\`)\n\n`;

            if (prNumber) {
              message += `🔀 **Pull Request Created:** #${prNumber}\n${prUrl}\n\nPlease review and merge the PR to publish the article.`;
            } else {
              message += `✅ **Changes Committed Directly**\n🔗 **Preview:** https://www.runink.org/blog/${slug}/\n\nThe site will be deployed shortly.`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.topic.outputs.issue_number }},
              body: message
            });

            // Close the issue
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.topic.outputs.issue_number }},
              state: 'closed',
              labels: ['blog-request', 'completed']
            });

      - name: Comment on issue (failure)
        if: failure() && github.event_name == 'issues' && steps.topic.outputs.issue_number
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.topic.outputs.issue_number }},
              body: `❌ **Blog Generation Failed**\n\n⚠️ Please check the GitHub Actions logs for details:\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\n\nKeeping this issue open for retry.`
            });

      - name: Send LinkedIn Post Suggestions to Slack
        if: success()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            TOPIC="${{ steps.topic.outputs.topic }}"
            SLUG="${{ steps.topic.outputs.slug }}"
            BLOG_URL="https://www.runink.org/blog/${SLUG}/"
            PR_URL="${{ steps.create_pr.outputs.pull-request-url }}"
            
            COMPANY_POST='${{ steps.post_content.outputs.company_post }}'
            PERSONAL_POST='${{ steps.post_content.outputs.personal_post }}'
            
            # Send to Slack
            curl -X POST "$SLACK_WEBHOOK_URL" \
              -H 'Content-Type: application/json' \
              -d "{
              \"text\": \"📝 New Blog Published - LinkedIn Promotion Ready\",
              \"blocks\": [
                {
                  \"type\": \"header\",
                  \"text\": {
                    \"type\": \"plain_text\",
                    \"text\": \"📝 New Blog Article Ready for Promotion\"
                  }
                },
                {
                  \"type\": \"section\",
                  \"fields\": [
                    {
                      \"type\": \"mrkdwn\",
                      \"text\": \"*Topic:*\n${TOPIC}\"
                    },
                    {
                      \"type\": \"mrkdwn\",
                      \"text\": \"*Blog URL:*\n<${BLOG_URL}|View Article>\"
                    }
                  ]
                },
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"*PR for Review:*\n<${PR_URL}|View Pull Request>\"
                  }
                },
                {
                  \"type\": \"divider\"
                },
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"*📢 LinkedIn Company Page Post:*\n\\\`\\\`\\\`${COMPANY_POST}\\\`\\\`\\\`\"
                  }
                },
                {
                  \"type\": \"divider\"
                },
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"*🔁 Your Personal Repost Message:*\n\\\`\\\`\\\`${PERSONAL_POST}\\\`\\\`\\\`\"
                  }
                },
                {
                  \"type\": \"context\",
                  \"elements\": [
                    {
                      \"type\": \"mrkdwn\",
                      \"text\": \"✏️ Feel free to customize these messages before posting!\"
                    }
                  ]
                }
              ]
            }"
          fi
