<script type="module">
  import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs";
  
  if (!window.mermaidInitialized) {
    window.mermaidInitialized = true;
    
    mermaid.initialize({ 
      startOnLoad: false, 
      securityLevel: "strict",
      theme: "base",
      themeVariables: {
        fontFamily: "Inter, system-ui, sans-serif",
        primaryColor: "#1b1919",
        primaryTextColor: "#ffffff",
        primaryBorderColor: "#ea580c",
        lineColor: "#ea580c",
        secondaryColor: "#1f1d1b",
        tertiaryColor: "#0c0a09",
        clusterBkg: "transparent",
        clusterBorder: "#65793e",
        titleColor: "#ea580c",
        edgeLabelBackground: "#1b1919",
        nodeBorder: "#ea580c",
        mainBkg: "#1b1919",
        nodeTextColor: "#ffffff"
      },
      c4: {
        personBgColor: "#0c0a09",
        personBorderColor: "#ea580c",
        systemBgColor: "#ea580c",
        systemBorderColor: "#ca4708",
        systemExtBgColor: "#1b1919",
        systemExtBorderColor: "#65793e",
        boundaryBgColor: "transparent"
      }
    });

    const initMermaid = async () => {
      try {
        await mermaid.run({
          querySelector: '.mermaid'
        });

        const script = document.createElement('script');
        script.src = "https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js";
        script.onload = () => {
          document.querySelectorAll('.mermaid svg').forEach(svg => {
            if (!svg.classList.contains('pan-zoom-initialized')) {
              svg.classList.add('pan-zoom-initialized');
              svgPanZoom(svg, {
                zoomEnabled: true,
                controlIconsEnabled: true,
                fit: true,
                center: true,
                minZoom: 0.1,
                maxZoom: 10
              });
            }
          });
        };
        document.head.appendChild(script);
      } catch (error) {
        console.error("Mermaid initialization failed:", error);
      }
    };

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initMermaid);
    } else {
      initMermaid();
    }
  }
</script>

<div class="mermaid-wrapper">
  <div class="mermaid">
    {{- .Inner -}}
  </div>
</div>
