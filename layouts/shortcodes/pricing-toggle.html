{{ $json := .Inner | transform.Unmarshal }}
<section class="py-4">
  <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-center">
      <div class="inline-flex rounded-full bg-[#161515] p-1.5 border border-stone-800 shadow-inner relative" role="tablist"
        aria-label="Pricing toggle">
        <div class="pricing-slider absolute top-1.5 bottom-1.5 left-0 rounded-full bg-[#ea580c] shadow-md transition-all duration-300 pointer-events-none" style="width: 0px; transform: translateX(0);"></div>
        {{ range $i, $opt := $json.options }}
        <button type="button"
          class="toggle-btn relative z-10 px-6 py-2.5 text-xs font-black uppercase tracking-[0.15em] text-stone-500 rounded-full transition-colors duration-300 focus:outline-none focus-visible:ring-2 focus-visible:ring-[#ea580c] focus-visible:ring-offset-2 focus-visible:ring-offset-[#161515]"
          data-value="{{ $opt.value }}" role="tab" aria-selected="false">
          {{ $opt.label }}
        </button>
        {{ end }}
      </div>
    </div>
  </div>
</section>

<script>
  (function () {
    var container = document.currentScript && document.currentScript.previousElementSibling;
    if (!container) return;
    var firstButtonGroup = container.querySelector('[role="tablist"]');
    if (!firstButtonGroup) return;
    var buttons = firstButtonGroup.querySelectorAll('button[data-value]');
    if (!buttons.length) return;

    var slider = firstButtonGroup.querySelector('.pricing-slider');

    function setActive(val) {
      document.documentElement.setAttribute('data-pricing', val);
      buttons.forEach(function (btn) {
        var isActive = btn.getAttribute('data-value') === val;
        btn.setAttribute('aria-selected', isActive ? 'true' : 'false');

        // Text Colors
        btn.classList.toggle('text-[#F5F1E8]', isActive);
        btn.classList.toggle('text-stone-500', !isActive);
        btn.classList.toggle('hover:text-stone-300', !isActive);

        if (isActive && slider) {
          slider.style.width = btn.offsetWidth + 'px';
          slider.style.transform = 'translateX(' + btn.offsetLeft + 'px)';
        }
      });

      // Emit custom event
      try {
        var evt = new CustomEvent('pricing:toggle', { detail: { value: val } });
        document.dispatchEvent(evt);
      } catch (e) { /* no-op */ }
    }

    buttons.forEach(function (btn) {
      btn.addEventListener('click', function () { setActive(btn.getAttribute('data-value')); });
    });

    window.addEventListener('resize', function() {
      var activeBtn = firstButtonGroup.querySelector('button[aria-selected="true"]');
      if (activeBtn && slider) {
        slider.style.width = activeBtn.offsetWidth + 'px';
        slider.style.transform = 'translateX(' + activeBtn.offsetLeft + 'px)';
      }
    });

    // Default to the first option
    if (buttons.length > 0) {
      // Small timeout to ensure DOM is fully rendered for offset calculations
      setTimeout(function() {
        setActive(buttons[0].getAttribute('data-value'));
      }, 50);
    }
  })();
</script>
