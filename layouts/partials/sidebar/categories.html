<div class="bg-stone-800 border border-stone-700 rounded-2xl shadow-xl shadow-stone-900/50 p-6">
    <h3 class="text-lg font-bold mb-4 text-white">{{ .Site.Params.blog.sidebar.categories.title | default
        "Categories" }}</h3>
    <div class="flex flex-wrap gap-2">
        {{ range $name, $taxonomy := .Site.Taxonomies.categories }}
        <a href="{{ "/categories/" | relLangURL }}{{ $name | urlize }}"
            class="inline-block px-3 py-1 text-sm font-medium text-stone-300 bg-stone-800 border border-stone-700 rounded-full hover:bg-stone-800 hover:text-[#ea580c] hover:border-[#ea580c]/50 transition-all duration-300">
            {{ $name }}
            <span class="text-stone-500 group-hover:text-[#ea580c]/80 ml-1">({{ $taxonomy.Count }})</span>
        </a>
        {{ end }}
    </div>
</div>
