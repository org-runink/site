<!-- Background Effects -->
<div class="absolute inset-0 bg-[radial-gradient(circle_at_top,_var(--tw-gradient-stops))] from-stone-900 via-stone-950 to-stone-950 z-0">
</div>
{{ $color := "#ea580c" }}
{{ if reflect.IsMap . }}
  {{ if isset . "color" }}
    {{ $color = .color }}
  {{ end }}
{{ end }}
<div class="absolute inset-0 opacity-20 pointer-events-none z-0"
    style="background-image: linear-gradient({{ $color }} 1px, transparent 1px), linear-gradient(90deg, {{ $color }} 1px, transparent 1px); background-size: 60px 60px;">
</div>
