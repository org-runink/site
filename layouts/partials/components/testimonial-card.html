<div class="testimonial-card">
    <div class="flex items-center space-x-4 mb-6">
        {{ partial "image.html" (dict "src" .avatar "alt" .name "class" "w-12 h-12 rounded-full" "width" "48x" "loading" "lazy" "context" $) }}
        <div>
            <h4 class="font-bold">{{ .name }}</h4>
            <p class="text-[#D9CDB8]">{{ .title }}</p>
        </div>
    </div>
    <p class="text-[#D9CDB8]">{{ .quote }}</p>
</div>
