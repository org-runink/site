    {{ if .Site.Params.blog.sidebar.tags.enable }}
    <div class="bg-stone-800 border border-stone-700 rounded-2xl shadow-xl shadow-stone-900/50 p-6">
        <h3 class="text-lg font-bold mb-4 text-white">{{ .Site.Params.blog.sidebar.tags.title | default "Popular Tags"
            }}</h3>
        <div class="flex flex-wrap gap-2">
            {{ $tagCount := .Site.Params.blog.sidebar.tags.count | default 20 }}
            {{ range first $tagCount .Site.Taxonomies.tags.ByCount }}
            <a href="{{ " /tags/" | relLangURL }}{{ .Name | urlize }}"
                class="text-sm text-stone-400 hover:text-[#ea580c] transition-colors duration-200">
                #{{ .Name }}
                <span class="text-stone-600">({{ .Count }})</span>
            </a>
            {{ end }}
        </div>
    </div>
    {{ end }}
