<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang | default "en" }}" class="h-full w-full overflow-hidden">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ default (printf "%s | %s" .Title .Site.Title) .Params.seo_title }}</title>
</head>
<body class="h-full w-full overflow-hidden m-0 p-0 bg-stone-950">
    {{ block "main" . }}{{ end }}
</body>
</html>
