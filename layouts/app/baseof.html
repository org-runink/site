<!DOCTYPE html>
<html lang="en-us" class="h-full w-full overflow-hidden">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {{ if .Params.redirect }}
    <meta http-equiv="refresh" content="0; url={{ .Params.redirect }}">
    <title>Redirecting to {{ .Params.redirect }}...</title>
    {{ else }}
    <title>{{ default (printf "%s | %s" .Title .Site.Title) .Params.seo_title }}</title>
    {{ end }}
</head>
<body class="h-full w-full overflow-hidden m-0 p-0 bg-stone-950">
    {{ if .Params.redirect }}
    <p>Redirecting to <a href="{{ .Params.redirect }}">{{ .Params.redirect }}</a>...</p>
    {{ else }}
    {{ block "main" . }}{{ end }}
    {{ end }}
</body>
</html>
